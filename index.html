<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <script src="script.js" defer></script>
    <title>Tic Tac Toe</title>
</head>
<body>
    <div class="header">
        <div class="title">Tic-Tac-Toe</div>
        <div class="header-right">
            <svg alt="Button to change between light and dark modes" class="light-dark-mode" xmlns="http://www.w3.org/2000/svg" width="2em" height="2em" viewBox="0 0 512 512"><path fill="var(--text-color)" fill-rule="evenodd" d="M277.333 405.333v85.333h-42.667v-85.333zm99.346-58.824l60.34 60.34l-30.17 30.17l-60.34-60.34zm-241.359 0l30.17 30.17l-60.34 60.34l-30.17-30.17zM256 139.353c64.422 0 116.647 52.224 116.647 116.647c0 64.422-52.225 116.647-116.647 116.647A116.427 116.427 0 0 1 139.352 256c0-64.423 52.225-116.647 116.648-116.647m0 42.666c-40.859 0-73.981 33.123-73.981 74.062a73.76 73.76 0 0 0 21.603 52.296c13.867 13.867 32.685 21.64 52.378 21.603zm234.666 52.647v42.667h-85.333v-42.667zm-384 0v42.667H21.333v-42.667zM105.15 74.98l60.34 60.34l-30.17 30.17l-60.34-60.34zm301.7 0l30.169 30.17l-60.34 60.34l-30.17-30.17zM277.332 21.333v85.333h-42.667V21.333z"/></svg>
        </div>
    </div>
    <div class="container">
        <div class="left-container">
            <div class="scoreboard">
                <div class="score-title">Scoreboard</div>
                <div class="score-container">
                    <div class="name" id="scoreboard-name1">Player One</div>
                    <div class="score" id="scoreboard-score1">0</div>
                    <div class="name" id="scoreboard-name2">Player Two</div>
                    <div class="score" id="scoreboard-score2">0</div>
                </div>
            </div>
        </div>
        <div class="right-container">
            <div class="message-container"></div>
            <div class="grid-container"></div>
            <div class="clear-container"></div>
        </div>
    </div>
    <div class="footer">
        <a href="https://github.com/jshuhler" target="_blank" rel="noreferrer">
            <p>

                <script>
                    document.write(new Date().getFullYear());
                </script>
            </p>
        </a>
    </div>
</body>
</html>
